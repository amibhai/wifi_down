# Router vendor default password database
# Used by modules/oui.py to generate vendor-specific wordlists.
# {last4mac} is substituted with the last 4 hex chars of the BSSID.

vendor_defaults:
  "TP-Link":
    default_ssid_patterns:
      - "TP-Link_{last4mac}"
      - "TP-LINK_{last4mac}"
    passwords:
      - "admin"
      - "tp-link123"
      - "tplink{last4mac}"
      - "password"
      - "12345678"
      - "tplink1234"
      - "wireless"
      - "1234567890"

  "Netgear":
    default_ssid_patterns:
      - "NETGEAR{last4mac}"
    passwords:
      - "admin"
      - "password"
      - "netgear"
      - "1234567890"
      - "password1"
      - "admin1234"
      - "12345678"

  "D-Link":
    default_ssid_patterns:
      - "dlink"
      - "D-Link_{last4mac}"
    passwords:
      - "admin"
      - "dlink"
      - "password"
      - ""
      - "1234"
      - "d-link"
      - "12345678"

  "Linksys":
